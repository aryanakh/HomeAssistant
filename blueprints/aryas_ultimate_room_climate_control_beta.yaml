blueprint:
  name: AryaNakh's Ultimate Room Climate Control - (v0.1.5b)
  author: AryaNakh
  homeassistant:
    min_version: 2024.11.0
  version: 0.1.5b
  description: |
    # AryaNakh's Ultimate Room Climate Control (v0.1.5b)

    Take control of your HVAC system at home. Control system based on room sensors and more!
    I plan on rolling out features and capabilities as I need them for my own step up. 

    # Current Features
      - Actively corrects when the room is outside the desired range
      - Widens the comfort band when the room is stable
      - Adjusts aggressiveness using a multiplier
      - Avoids excessive thermostat updates
      - Allows custom polling intervals

    # Beta Features
      - Boolean toggle to disable blueprint
      - configurable timing adjustments

  domain: automation
  ###########################################################################
  # INPUTS — user-configurable settings exposed in the Blueprint UI
  ###########################################################################
  input:
    # Main thermostat entity that will be controlled
    thermostat:
      name: Main Thermostat
      description: e.g. climate.upstairs_thermostat
      selector:
        entity:
          domain: climate

    # Room temperature sensor that drives control logic
    room_sensor:
      name: Room Temperature Sensor
      description: e.g. sensor.nursery_environment_sensor_temperature
      selector:
        entity:
          domain: sensor
          device_class: temperature

    # Lower bound of desired comfort range
    min_temperature:
      name: Desired Min Temp (°F) – comfort floor
      default: 68
      selector:
        number:
          min: 55
          max: 80
          step: 0.5

  # Upper bound of desired comfort rang
    max_temperature:
      name: Desired Max Temp (°F) – comfort ceiling
      default: 70
      selector:
        number:
          min: 55
          max: 80
          step: 0.5

    # HVAC mode used when actively controlling the thermostat
    control_mode:
      name: Active Mode (for forcing adjustments)
      description: heat_cool or auto recommended
      selector:
        select:
          options:
            - heat_cool
            - auto
            - heat
            - cool
      default: heat_cool

    # Controls how aggressively the thermostat corrects deviations
    adjustment_multiplier:
      name: Aggressiveness Multiplier
      description: 1.0 = gentle, 1.5 = balanced, 2.0 = strong
      default: 1.5
      selector:
        number:
          min: 0.5
          max: 3.0
          step: 0.1
          mode: slider

    # Extra deadband added when room is already comfortable
    neutral_buffer:
      name: Neutral Range Buffer (°F)
      description: Extra margin added/removed when room is happy → wider deadband
      default: 2.0
      selector:
        number:
          min: 0.0
          max: 10.0
          step: 0.5

    # Polling interval for automation run
    poll_interval_minutes:
      name: Polling Interval (minutes)
      description: How often the automation runs (Intervals below 5 minutes NOT recommended)
      default: 10
      selector:
        number:
          min: 1
          max: 360
          step: 1

    # Define a boolean or toggle which enbales or disables the blueprint
    enable_automation:
      name: Enable Climate Control
      description: Toggle to enable or disable this automation. If set "On", this automation will run. If "off", it will be disabled.
      selector:
        entity:
          domain: input_boolean

 ###########################################################################
  # VARIABLES — computed once per automation run
  ##########################################################################
variables:
  thermostat: !input thermostat
  room_sensor: !input room_sensor
  min_temp: !input min_temperature
  max_temp: !input max_temperature
  control_mode: !input control_mode
  multiplier: !input adjustment_multiplier
  buffer: !input neutral_buffer
  poll_interval: !input poll_interval_minutes
  enable_toggle: !input enable_automation

  # Target midpoint temperature (used for proportional control)
  target_temp: "{{ ((min_temp + max_temp) / 2) | round(1) }}"

  # Determines if thermostat supports low/high setpoints
  use_range_mode: "{{ control_mode in ['heat_cool', 'auto'] }}"

###########################################################################
# TRIGGER — automation runs every X minutes
###########################################################################
trigger:
  # Regular poll interval trigger 
  - platform: time_pattern
    minutes: "/{{ poll_interval }}"
    id: time_poll

  # Single trigger for disabling automtion
  - platform: state
    entity_id: !input enable_automation
    to: "off"
    id: enable_off

###########################################################################
# CONDITIONS — safety checks before running
###########################################################################
condition:
  # Master enable/disable toggle
  - condition: state
    entity_id: !input enable_automation
    state: "on"

  # Existing safety condition
  - condition: template
    value_template: >
      {{ is_number(states(room_sensor)) and
         states(thermostat) not in ['off', 'unavailable'] }}

###########################################################################
# ACTIONS — main control logic
###########################################################################
action:
  - choose:
      #######################################################################
      # CASE 1 — Automation disabled → turn thermostat OFF (once)
      #######################################################################
      - conditions:
          - condition: trigger
            id: "enable_off"
        sequence:
          - service: climate.turn_off
            target:
              entity_id: !input thermostat

          - service: system_log.write
            data:
              message: "Automation disabled → thermostat turned OFF"
              level: warning

      #######################################################################
      # CASE 2 — Automation enabled → normal control logic
      #######################################################################
      - conditions:
          - condition: state
            entity_id: !input enable_automation
            state: "on"
        sequence:
          # Calculate runtime variables
          - variables:
            # Current room temperature
              room_temp: "{{ states(room_sensor) | float(65) }}"
              # Absolute deviation from target midpoint
              deviation: "{{ (room_temp - target_temp) | abs | round(2) }}"
              # Proportional correction setpoint
              desired_setpoint: "{{ (target_temp - (multiplier * (room_temp - target_temp))) | round(1) }}"
              # Neutral comfort band when room is stable
              neutral_low: "{{ (min_temp - buffer) | round(1) }}"
              neutral_high: "{{ (max_temp + buffer) | round(1) }}"
              # Current thermostat settings
              current_setpoint: "{{ state_attr(thermostat, 'temperature') | float(none) }}"
              current_low: "{{ state_attr(thermostat, 'target_temp_low') | float(none) }}"
              current_high: "{{ state_attr(thermostat, 'target_temp_high') | float(none) }}"

        # Log current evaluation state *ONLY FOR BETA. REMOVE FOR STABLE*
          - service: system_log.write
            data:
              message: >
                Check {{ now().strftime('%H:%M') }} | Room {{ room_temp }}°F (dev {{ deviation }}°F)
                Desired {{ desired_setpoint }}°F | Current {{ current_setpoint }}
                Neutral range would be {{ neutral_low }}–{{ neutral_high }}°F
              level: info

          ###########################################################################
          # Only act if:
          #   - Room is meaningfully off target
          #   - OR thermostat settings don’t match expected values
          ###########################################################################

          - condition: or
            conditions:
              - "{{ deviation > 0.9 }}"
              - condition: template
                value_template: >
                  {% if use_range_mode %}
                    {{ current_low is none or current_high is none or current_low != neutral_low or current_high != neutral_high }}
                  {% else %}
                    {{ current_setpoint is none or (desired_setpoint - current_setpoint) | abs > 0.7 }}
                  {% endif %}

          ###########################################################################
          # DECISION TREE — heating, cooling, or neutral behavior
          ###########################################################################
          - choose:
              # Room too cold → force heating
              - conditions:
                  - "{{ room_temp < min_temp }}"
                sequence:
                  - service: climate.set_hvac_mode
                    target:
                      entity_id: !input thermostat
                    data:
                      hvac_mode: heat
                  - delay:
                      seconds: 3
                  - service: climate.set_temperature
                    target:
                      entity_id: !input thermostat
                    data:
                      temperature: "{{ desired_setpoint }}"

              # Room too hot → force cooling
              - conditions:
                  - "{{ room_temp > max_temp }}"
                sequence:
                  - service: climate.set_hvac_mode
                    target:
                      entity_id: !input thermostat
                    data:
                      hvac_mode: cool
                  - delay:
                      seconds: 3
                  - service: climate.set_temperature
                    target:
                      entity_id: !input thermostat
                    data:
                      temperature: "{{ desired_setpoint }}"

              # Room within desired range → relaxed behavior
              - conditions: []
                sequence:
                  - choose:
                      # Use wide comfort band if range mode supported
                      - conditions:
                          - "{{ use_range_mode }}"
                        sequence:
                          - service: climate.set_hvac_mode
                            target:
                              entity_id: !input thermostat
                            data:
                              hvac_mode: !input control_mode
                          - service: climate.set_temperature
                            target:
                              entity_id: !input thermostat
                            data:
                              target_temp_low: "{{ neutral_low }}"
                              target_temp_high: "{{ neutral_high }}"
                          - service: system_log.write
                            data:
                              message: "Room happy → set wide comfort band {{ neutral_low }}–{{ neutral_high }}°F"
                              level: info

                      # Fallback for single-setpoint thermostats
                      - conditions: []
                        sequence:
                          - service: climate.set_hvac_mode
                            target:
                              entity_id: !input thermostat
                            data:
                              hvac_mode: !input control_mode
                          - service: climate.set_temperature
                            target:
                              entity_id: !input thermostat
                            data:
                              temperature: "{{ target_temp }}"

        # Final log entry
          - service: system_log.write
            data:
              message: "Adjustment completed"
              level: info

# Prevent overlapping run
mode: single
