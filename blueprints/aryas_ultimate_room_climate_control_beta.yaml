blueprint:
  name: AryaNakh's Ultimate Room Climate Control - (v0.2.0b)
  author: AryaNakh
  homeassistant:
    min_version: 2024.11.0
  description: |
    # AryaNakh's Ultimate Room Climate Control (v0.2.0b)

    Take control of your HVAC system at home with 4-room zone control and relay-board damper support.

    # Current Features
      - Actively corrects when a room is outside its desired range
      - Priority-based conflict resolution when rooms disagree on heat vs cool
      - Per-room damper control via relay board (up to 4 rooms, up to 2 dampers per room)
      - 5 room rules: heat_only, cool_only, heat_and_cool, hold_range, do_nothing
      - Widens the comfort band when all rooms are stable

      - Avoids excessive thermostat updates with deadband checks
      - Allows custom polling intervals

    # Beta Features
      - Boolean toggle to disable blueprint
      - Configurable timing adjustments
      - Per-room enable/disable toggle

    # Room Rules
      - heat_only: Room can only request heating. Damper closes when HVAC is cooling.
      - cool_only: Room can only request cooling. Damper closes when HVAC is heating.
      - heat_and_cool: Room participates in both heating and cooling requests.
      - hold_range: Same as heat_and_cool but signals strict range intent.
      - do_nothing: Room never votes; damper follows the global do_nothing default.

    # Conflict Resolution
      When one room needs heat and another needs cool, the room with the lower
      priority number wins. Ties default to heat (safer for occupants).
      Do NOT assign the same priority number to rooms with likely conflicting needs.

  domain: automation

  ###########################################################################
  # INPUTS — user-configurable settings exposed in the Blueprint UI
  ###########################################################################
  input:

    # -------------------------------------------------------------------------
    # GLOBAL SETTINGS
    # -------------------------------------------------------------------------

    thermostat:
      name: Main Thermostat
      description: e.g. climate.upstairs_thermostat
      selector:
        entity:
          domain: climate

    do_nothing_default_state:
      name: Default Damper State for "Do Nothing" Rooms
      description: Whether do_nothing rooms have their damper open or closed while HVAC runs.
      selector:
        select:
          options:
            - open
            - closed
      default: open

    neutral_buffer:
      name: Neutral Range Buffer (°F)
      description: Extra margin added when all rooms are comfortable → wider deadband
      default: 2.0
      selector:
        number:
          min: 0.0
          max: 10.0
          step: 0.5

    poll_interval_minutes:
      name: Polling Interval
      description: How often the automation runs (below 5 minutes NOT recommended)
      selector:
        select:
          options:
            - label: "Every 5 minutes"
              value: "/5"
            - label: "Every 10 minutes"
              value: "/10"
            - label: "Every 15 minutes"
              value: "/15"
            - label: "Every 30 minutes"
              value: "/30"
            - label: "Every 60 minutes"
              value: "/60"
      default: "/10"

    enable_automation:
      name: Enable Climate Control
      description: Toggle to enable or disable this automation. If "On", automation runs. If "Off", thermostat turns off.
      selector:
        entity:
          domain: input_boolean

    # -------------------------------------------------------------------------
    # MODE SELECTOR (optional) — Away and Night mode via input_select
    # -------------------------------------------------------------------------

    mode_entity:
      name: Mode Selector (optional)
      description: input_select entity whose state drives Away/Night mode. Leave blank to disable.
      default: {}
      selector:
        entity:
          domain: input_select

    away_mode_value:
      name: Away Mode State Value
      description: The input_select state that activates Away mode (e.g. "Away")
      default: "Away"
      selector:
        text: {}

    night_mode_value:
      name: Night Mode State Value
      description: The input_select state that activates Night mode (e.g. "Night")
      default: "Night"
      selector:
        text: {}

    away_min_temp:
      name: Away Mode - Min Temperature (°F)
      description: Temperature floor enforced for all rooms when Away mode is active
      default: 60
      selector:
        number:
          min: 50
          max: 75
          step: 0.5

    away_max_temp:
      name: Away Mode - Max Temperature (°F)
      description: Temperature ceiling enforced for all rooms when Away mode is active
      default: 75
      selector:
        number:
          min: 55
          max: 85
          step: 0.5

    min_setpoint:
      name: Minimum Thermostat Setpoint (°F)
      description: Hard floor — the thermostat will never be commanded below this, regardless of how many cycles the room stays out of range.
      default: 65
      selector:
        number:
          min: 55
          max: 72
          step: 0.5

    max_setpoint:
      name: Maximum Thermostat Setpoint (°F)
      description: Hard ceiling — the thermostat will never be commanded above this.
      default: 80
      selector:
        number:
          min: 73
          max: 90
          step: 0.5

    setpoint_step:
      name: Setpoint Step (°F per cycle)
      description: How much to nudge the thermostat setpoint each polling cycle relative to the thermostat's current reading. e.g. 2°F means each cycle the setpoint moves 2°F further until the room is in range.
      default: 2
      selector:
        number:
          min: 0.5
          max: 3.0
          step: 0.5

    ###########################################################################
    # ROOM 1 CONFIGURATION
    ###########################################################################

    room1_sensor:
      name: Room 1 - Temperature Sensor
      description: e.g. sensor.room1_temperature
      selector:
        entity:
          domain: sensor
          device_class: temperature

    room1_damper:
      name: Room 1 - Damper Switch
      description: Switch entity for the relay-controlled vent damper
      selector:
        entity:
          domain: switch

    room1_damper2:
      name: Room 1 - Second Damper Switch (optional)
      description: Leave blank if this room only has one damper
      default: {}
      selector:
        entity:
          domain: switch

    room1_rule:
      name: Room 1 - Room Rule
      description: How this room participates in HVAC requests
      selector:
        select:
          options:
            - heat_only
            - cool_only
            - heat_and_cool
            - hold_range
            - do_nothing
      default: heat_and_cool

    room1_priority:
      name: Room 1 - Priority (1=highest, 4=lowest)
      description: Lower number wins in heat vs cool conflicts
      default: 1
      selector:
        number:
          min: 1
          max: 4
          step: 1
          mode: box

    room1_min_temp:
      name: Room 1 - Min Temperature (°F)
      default: 68
      selector:
        number:
          min: 55
          max: 80
          step: 0.5

    room1_max_temp:
      name: Room 1 - Max Temperature (°F)
      default: 70
      selector:
        number:
          min: 55
          max: 80
          step: 0.5

    room1_enabled:
      name: Room 1 - Enable this room
      description: Toggle to include or exclude this room from control logic
      default: true
      selector:
        boolean: {}

    room1_name:
      name: Room 1 - Display Name
      description: Used in log messages
      default: "Room 1"
      selector:
        text: {}

    room1_schedule:
      name: Room 1 - Schedule
      description: "always: follows enabled toggle | night_only: active only in Night mode | day_only: inactive in Night mode"
      default: "always"
      selector:
        select:
          options:
            - always
            - night_only
            - day_only

    ###########################################################################
    # ROOM 2 CONFIGURATION
    ###########################################################################

    room2_sensor:
      name: Room 2 - Temperature Sensor
      description: e.g. sensor.room2_temperature
      selector:
        entity:
          domain: sensor
          device_class: temperature

    room2_damper:
      name: Room 2 - Damper Switch
      description: Switch entity for the relay-controlled vent damper
      selector:
        entity:
          domain: switch

    room2_damper2:
      name: Room 2 - Second Damper Switch (optional)
      description: Leave blank if this room only has one damper
      default: {}
      selector:
        entity:
          domain: switch

    room2_rule:
      name: Room 2 - Room Rule
      description: How this room participates in HVAC requests
      selector:
        select:
          options:
            - heat_only
            - cool_only
            - heat_and_cool
            - hold_range
            - do_nothing
      default: heat_and_cool

    room2_priority:
      name: Room 2 - Priority (1=highest, 4=lowest)
      description: Lower number wins in heat vs cool conflicts
      default: 2
      selector:
        number:
          min: 1
          max: 4
          step: 1
          mode: box

    room2_min_temp:
      name: Room 2 - Min Temperature (°F)
      default: 68
      selector:
        number:
          min: 55
          max: 80
          step: 0.5

    room2_max_temp:
      name: Room 2 - Max Temperature (°F)
      default: 70
      selector:
        number:
          min: 55
          max: 80
          step: 0.5

    room2_enabled:
      name: Room 2 - Enable this room
      description: Toggle to include or exclude this room from control logic
      default: true
      selector:
        boolean: {}

    room2_name:
      name: Room 2 - Display Name
      description: Used in log messages
      default: "Room 2"
      selector:
        text: {}

    room2_schedule:
      name: Room 2 - Schedule
      description: "always: follows enabled toggle | night_only: active only in Night mode | day_only: inactive in Night mode"
      default: "always"
      selector:
        select:
          options:
            - always
            - night_only
            - day_only

    ###########################################################################
    # ROOM 3 CONFIGURATION
    ###########################################################################

    room3_sensor:
      name: Room 3 - Temperature Sensor
      description: e.g. sensor.room3_temperature
      selector:
        entity:
          domain: sensor
          device_class: temperature

    room3_damper:
      name: Room 3 - Damper Switch
      description: Switch entity for the relay-controlled vent damper
      selector:
        entity:
          domain: switch

    room3_damper2:
      name: Room 3 - Second Damper Switch (optional)
      description: Leave blank if this room only has one damper
      default: {}
      selector:
        entity:
          domain: switch

    room3_rule:
      name: Room 3 - Room Rule
      description: How this room participates in HVAC requests
      selector:
        select:
          options:
            - heat_only
            - cool_only
            - heat_and_cool
            - hold_range
            - do_nothing
      default: heat_and_cool

    room3_priority:
      name: Room 3 - Priority (1=highest, 4=lowest)
      description: Lower number wins in heat vs cool conflicts
      default: 3
      selector:
        number:
          min: 1
          max: 4
          step: 1
          mode: box

    room3_min_temp:
      name: Room 3 - Min Temperature (°F)
      default: 68
      selector:
        number:
          min: 55
          max: 80
          step: 0.5

    room3_max_temp:
      name: Room 3 - Max Temperature (°F)
      default: 70
      selector:
        number:
          min: 55
          max: 80
          step: 0.5

    room3_enabled:
      name: Room 3 - Enable this room
      description: Toggle to include or exclude this room from control logic
      default: true
      selector:
        boolean: {}

    room3_name:
      name: Room 3 - Display Name
      description: Used in log messages
      default: "Room 3"
      selector:
        text: {}

    room3_schedule:
      name: Room 3 - Schedule
      description: "always: follows enabled toggle | night_only: active only in Night mode | day_only: inactive in Night mode"
      default: "always"
      selector:
        select:
          options:
            - always
            - night_only
            - day_only

    ###########################################################################
    # ROOM 4 CONFIGURATION
    ###########################################################################

    room4_sensor:
      name: Room 4 - Temperature Sensor
      description: e.g. sensor.room4_temperature
      selector:
        entity:
          domain: sensor
          device_class: temperature

    room4_damper:
      name: Room 4 - Damper Switch
      description: Switch entity for the relay-controlled vent damper
      selector:
        entity:
          domain: switch

    room4_damper2:
      name: Room 4 - Second Damper Switch (optional)
      description: Leave blank if this room only has one damper
      default: {}
      selector:
        entity:
          domain: switch

    room4_rule:
      name: Room 4 - Room Rule
      description: How this room participates in HVAC requests
      selector:
        select:
          options:
            - heat_only
            - cool_only
            - heat_and_cool
            - hold_range
            - do_nothing
      default: heat_and_cool

    room4_priority:
      name: Room 4 - Priority (1=highest, 4=lowest)
      description: Lower number wins in heat vs cool conflicts
      default: 4
      selector:
        number:
          min: 1
          max: 4
          step: 1
          mode: box

    room4_min_temp:
      name: Room 4 - Min Temperature (°F)
      default: 68
      selector:
        number:
          min: 55
          max: 80
          step: 0.5

    room4_max_temp:
      name: Room 4 - Max Temperature (°F)
      default: 70
      selector:
        number:
          min: 55
          max: 80
          step: 0.5

    room4_enabled:
      name: Room 4 - Enable this room
      description: Toggle to include or exclude this room from control logic
      default: false
      selector:
        boolean: {}

    room4_name:
      name: Room 4 - Display Name
      description: Used in log messages
      default: "Room 4"
      selector:
        text: {}

    room4_schedule:
      name: Room 4 - Schedule
      description: "always: follows enabled toggle | night_only: active only in Night mode | day_only: inactive in Night mode"
      default: "always"
      selector:
        select:
          options:
            - always
            - night_only
            - day_only

###########################################################################
# VARIABLES — computed once per automation run
# IMPORTANT: dependency order is strict — do not reorder these blocks.
###########################################################################
variables:

  # -------------------------------------------------------------------------
  # Level 1: Global !input bindings
  # -------------------------------------------------------------------------
  thermostat: !input thermostat
  buffer: !input neutral_buffer
  enable_toggle: !input enable_automation
  do_nothing_default: !input do_nothing_default_state
  mode_entity: !input mode_entity
  away_mode_val: !input away_mode_value
  night_mode_val: !input night_mode_value
  away_min: !input away_min_temp
  away_max: !input away_max_temp
  min_sp: !input min_setpoint
  max_sp: !input max_setpoint
  setpoint_step: !input setpoint_step

  # -------------------------------------------------------------------------
  # Level 2: Per-room raw !input bindings (flat, one per field per room)
  # damper2 inputs may be empty string "" when left unconfigured
  # -------------------------------------------------------------------------
  r1_sensor: !input room1_sensor
  r1_damper: !input room1_damper
  r1_damper2: !input room1_damper2
  r1_rule: !input room1_rule
  r1_priority: !input room1_priority
  r1_min: !input room1_min_temp
  r1_max: !input room1_max_temp
  r1_enabled: !input room1_enabled
  r1_name: !input room1_name
  r1_schedule: !input room1_schedule

  r2_sensor: !input room2_sensor
  r2_damper: !input room2_damper
  r2_damper2: !input room2_damper2
  r2_rule: !input room2_rule
  r2_priority: !input room2_priority
  r2_min: !input room2_min_temp
  r2_max: !input room2_max_temp
  r2_enabled: !input room2_enabled
  r2_name: !input room2_name
  r2_schedule: !input room2_schedule

  r3_sensor: !input room3_sensor
  r3_damper: !input room3_damper
  r3_damper2: !input room3_damper2
  r3_rule: !input room3_rule
  r3_priority: !input room3_priority
  r3_min: !input room3_min_temp
  r3_max: !input room3_max_temp
  r3_enabled: !input room3_enabled
  r3_name: !input room3_name
  r3_schedule: !input room3_schedule

  r4_sensor: !input room4_sensor
  r4_damper: !input room4_damper
  r4_damper2: !input room4_damper2
  r4_rule: !input room4_rule
  r4_priority: !input room4_priority
  r4_min: !input room4_min_temp
  r4_max: !input room4_max_temp
  r4_enabled: !input room4_enabled
  r4_name: !input room4_name
  r4_schedule: !input room4_schedule

  # -------------------------------------------------------------------------
  # Level 2.5: Mode resolution — resolved before rooms loop needs them
  # -------------------------------------------------------------------------
  mode_entity_active: >
    {{ mode_entity is string and mode_entity != '' }}

  current_mode: >
    {% if mode_entity is string and mode_entity != '' %}
      {{ states(mode_entity) }}
    {% else %}
      normal
    {% endif %}

  is_away_mode: >
    {{ mode_entity is string and mode_entity != ''
       and states(mode_entity) == away_mode_val }}

  is_night_mode: >
    {{ mode_entity is string and mode_entity != ''
       and states(mode_entity) == night_mode_val }}

  # -------------------------------------------------------------------------
  # Level 3: rooms — active rooms with valid sensors, filtered by schedule
  #
  # Schedule gate:
  #   always    → included when r.enabled is true
  #   night_only → included only when Night mode is active (ignores enabled toggle)
  #   day_only  → included only when Night mode is NOT active (ignores enabled toggle)
  #
  # Away mode: substitutes global away_min/away_max for per-room bounds.
  # Room rules (heat_only, cool_only, etc.) are still respected.
  # -------------------------------------------------------------------------
  rooms: >
    {% set ns = namespace(result=[]) %}
    {% set room_defs = [
      {'id': 1, 'name': r1_name, 'sensor': r1_sensor, 'damper': r1_damper,
       'rule': r1_rule, 'priority': r1_priority, 'min': r1_min, 'max': r1_max,
       'enabled': r1_enabled, 'schedule': r1_schedule},
      {'id': 2, 'name': r2_name, 'sensor': r2_sensor, 'damper': r2_damper,
       'rule': r2_rule, 'priority': r2_priority, 'min': r2_min, 'max': r2_max,
       'enabled': r2_enabled, 'schedule': r2_schedule},
      {'id': 3, 'name': r3_name, 'sensor': r3_sensor, 'damper': r3_damper,
       'rule': r3_rule, 'priority': r3_priority, 'min': r3_min, 'max': r3_max,
       'enabled': r3_enabled, 'schedule': r3_schedule},
      {'id': 4, 'name': r4_name, 'sensor': r4_sensor, 'damper': r4_damper,
       'rule': r4_rule, 'priority': r4_priority, 'min': r4_min, 'max': r4_max,
       'enabled': r4_enabled, 'schedule': r4_schedule}
    ] %}
    {% for r in room_defs %}
      {% set schedule_active =
          (r.schedule == 'always' and r.enabled) or
          (r.schedule == 'night_only' and is_night_mode) or
          (r.schedule == 'day_only' and not is_night_mode) %}
      {% if schedule_active and is_number(states(r.sensor)) %}
        {% set eff_min = away_min if is_away_mode else r.min %}
        {% set eff_max = away_max if is_away_mode else r.max %}
        {% set temp = states(r.sensor) | float %}
        {% set target = ((eff_min + eff_max) / 2) | round(1) %}
        {% set needs_heat = (temp < eff_min) and r.rule in ['heat_only', 'heat_and_cool', 'hold_range'] %}
        {% set needs_cool = (temp > eff_max) and r.rule in ['cool_only', 'heat_and_cool', 'hold_range'] %}
        {% set is_comfortable = (temp >= eff_min) and (temp <= eff_max) %}
        {% set deviation = (temp - target) | abs | round(2) %}
        {% set room_state = dict(r,
          temp=temp,
          target=target,
          needs_heat=needs_heat,
          needs_cool=needs_cool,
          is_comfortable=is_comfortable,
          deviation=deviation,
          eff_min=eff_min,
          eff_max=eff_max
        ) %}
        {% set ns.result = ns.result + [room_state] %}
      {% endif %}
    {% endfor %}
    {{ ns.result }}

  # -------------------------------------------------------------------------
  # Level 3.5: all_rooms_debug — all 4 rooms regardless of schedule/sensor
  # Used exclusively for verbose logging; never drives HVAC logic
  # -------------------------------------------------------------------------
  all_rooms_debug: >
    {% set ns = namespace(result=[]) %}
    {% set room_defs = [
      {'id': 1, 'name': r1_name, 'sensor': r1_sensor, 'rule': r1_rule,
       'priority': r1_priority, 'min': r1_min, 'max': r1_max,
       'enabled': r1_enabled, 'schedule': r1_schedule},
      {'id': 2, 'name': r2_name, 'sensor': r2_sensor, 'rule': r2_rule,
       'priority': r2_priority, 'min': r2_min, 'max': r2_max,
       'enabled': r2_enabled, 'schedule': r2_schedule},
      {'id': 3, 'name': r3_name, 'sensor': r3_sensor, 'rule': r3_rule,
       'priority': r3_priority, 'min': r3_min, 'max': r3_max,
       'enabled': r3_enabled, 'schedule': r3_schedule},
      {'id': 4, 'name': r4_name, 'sensor': r4_sensor, 'rule': r4_rule,
       'priority': r4_priority, 'min': r4_min, 'max': r4_max,
       'enabled': r4_enabled, 'schedule': r4_schedule}
    ] %}
    {% for r in room_defs %}
      {% set has_temp = is_number(states(r.sensor)) %}
      {% set schedule_active =
          (r.schedule == 'always' and r.enabled) or
          (r.schedule == 'night_only' and is_night_mode) or
          (r.schedule == 'day_only' and not is_night_mode) %}
      {% set eff_min = away_min if is_away_mode else r.min %}
      {% set eff_max = away_max if is_away_mode else r.max %}
      {% set temp = states(r.sensor) | float(none) if has_temp else none %}
      {% set entry = dict(r,
        has_temp=has_temp,
        schedule_active=schedule_active,
        eff_min=eff_min,
        eff_max=eff_max,
        temp=temp
      ) %}
      {% set ns.result = ns.result + [entry] %}
    {% endfor %}
    {{ ns.result }}

  # -------------------------------------------------------------------------
  # Level 4: rooms filtered by what they need
  # -------------------------------------------------------------------------
  heat_requesting: >
    {{ rooms | selectattr('needs_heat', 'eq', true) | list }}

  cool_requesting: >
    {{ rooms | selectattr('needs_cool', 'eq', true) | list }}

  # -------------------------------------------------------------------------
  # Level 5: winning room per mode — highest priority (lowest number) first
  # -------------------------------------------------------------------------
  winning_heat_room: >
    {% set candidates = heat_requesting | sort(attribute='priority') %}
    {{ candidates[0] if candidates | length > 0 else none }}

  winning_cool_room: >
    {% set candidates = cool_requesting | sort(attribute='priority') %}
    {{ candidates[0] if candidates | length > 0 else none }}

  # -------------------------------------------------------------------------
  # Level 6: hvac_decision — the resolved HVAC mode for this cycle
  #   Tie (equal priority, heat vs cool) → heat wins as safer default
  # -------------------------------------------------------------------------
  hvac_decision: >
    {% if winning_heat_room is none and winning_cool_room is none %}
      comfortable
    {% elif winning_heat_room is none %}
      cool
    {% elif winning_cool_room is none %}
      heat
    {% elif winning_heat_room.priority <= winning_cool_room.priority %}
      heat
    {% else %}
      cool
    {% endif %}

  # -------------------------------------------------------------------------
  # Level 7: winning_room — the room driving the thermostat setpoint
  # -------------------------------------------------------------------------
  winning_room: >
    {% if hvac_decision == 'heat' %}
      {{ winning_heat_room }}
    {% elif hvac_decision == 'cool' %}
      {{ winning_cool_room }}
    {% else %}
      none
    {% endif %}

  # -------------------------------------------------------------------------
  # Level 7.5: winning room derived values (moved from inline action step
  # so they are available for the verbose log which runs before the deadband check)
  # -------------------------------------------------------------------------
  winning_deviation: >
    {% if winning_room != 'none' and winning_room is mapping %}
      {{ winning_room.deviation }}
    {% else %}
      0
    {% endif %}

  # -------------------------------------------------------------------------
  # Level 8: comfort midpoint — average of all enabled room targets
  # -------------------------------------------------------------------------
  all_room_midpoints: >
    {{ rooms | map(attribute='target') | list }}

  comfort_midpoint: >
    {% if all_room_midpoints | length > 0 %}
      {{ (all_room_midpoints | sum / all_room_midpoints | length) | round(1) }}
    {% else %}
      69
    {% endif %}

  # -------------------------------------------------------------------------
  # Level 9: neutral band for comfortable state
  # -------------------------------------------------------------------------
  neutral_low: "{{ (comfort_midpoint - buffer) | round(1) }}"
  neutral_high: "{{ (comfort_midpoint + buffer) | round(1) }}"

  # -------------------------------------------------------------------------
  # Level 10: per-damper open/close decision (pre-computed for action section)
  #
  # Damper logic per rule:
  #   heat_only:      open when HVAC=heat AND room needs_heat; else closed
  #   cool_only:      open when HVAC=cool AND room needs_cool; else closed
  #   heat_and_cool:  open when HVAC matches room need; else closed
  #   hold_range:     same as heat_and_cool
  #   do_nothing:     always follows do_nothing_default (never votes)
  #   comfortable:    all non-do_nothing dampers close
  # -------------------------------------------------------------------------
  room1_damper_open: >
    {% set r = rooms | selectattr('id', 'eq', 1) | list %}
    {% if r | length == 0 %}
      false
    {% elif r[0].rule == 'do_nothing' %}
      {{ do_nothing_default == 'open' }}
    {% elif r[0].rule == 'heat_only' %}
      {{ hvac_decision == 'heat' and r[0].needs_heat }}
    {% elif r[0].rule == 'cool_only' %}
      {{ hvac_decision == 'cool' and r[0].needs_cool }}
    {% elif r[0].rule in ['heat_and_cool', 'hold_range'] %}
      {{ (hvac_decision == 'heat' and r[0].needs_heat) or
         (hvac_decision == 'cool' and r[0].needs_cool) }}
    {% else %}
      false
    {% endif %}

  room2_damper_open: >
    {% set r = rooms | selectattr('id', 'eq', 2) | list %}
    {% if r | length == 0 %}
      false
    {% elif r[0].rule == 'do_nothing' %}
      {{ do_nothing_default == 'open' }}
    {% elif r[0].rule == 'heat_only' %}
      {{ hvac_decision == 'heat' and r[0].needs_heat }}
    {% elif r[0].rule == 'cool_only' %}
      {{ hvac_decision == 'cool' and r[0].needs_cool }}
    {% elif r[0].rule in ['heat_and_cool', 'hold_range'] %}
      {{ (hvac_decision == 'heat' and r[0].needs_heat) or
         (hvac_decision == 'cool' and r[0].needs_cool) }}
    {% else %}
      false
    {% endif %}

  room3_damper_open: >
    {% set r = rooms | selectattr('id', 'eq', 3) | list %}
    {% if r | length == 0 %}
      false
    {% elif r[0].rule == 'do_nothing' %}
      {{ do_nothing_default == 'open' }}
    {% elif r[0].rule == 'heat_only' %}
      {{ hvac_decision == 'heat' and r[0].needs_heat }}
    {% elif r[0].rule == 'cool_only' %}
      {{ hvac_decision == 'cool' and r[0].needs_cool }}
    {% elif r[0].rule in ['heat_and_cool', 'hold_range'] %}
      {{ (hvac_decision == 'heat' and r[0].needs_heat) or
         (hvac_decision == 'cool' and r[0].needs_cool) }}
    {% else %}
      false
    {% endif %}

  room4_damper_open: >
    {% set r = rooms | selectattr('id', 'eq', 4) | list %}
    {% if r | length == 0 %}
      false
    {% elif r[0].rule == 'do_nothing' %}
      {{ do_nothing_default == 'open' }}
    {% elif r[0].rule == 'heat_only' %}
      {{ hvac_decision == 'heat' and r[0].needs_heat }}
    {% elif r[0].rule == 'cool_only' %}
      {{ hvac_decision == 'cool' and r[0].needs_cool }}
    {% elif r[0].rule in ['heat_and_cool', 'hold_range'] %}
      {{ (hvac_decision == 'heat' and r[0].needs_heat) or
         (hvac_decision == 'cool' and r[0].needs_cool) }}
    {% else %}
      false
    {% endif %}

###########################################################################
# TRIGGER — automation runs every X minutes or when disabled
# NOTE: !input is used directly so HA validates the value at import time.
###########################################################################
trigger:
  - platform: time_pattern
    minutes: !input poll_interval_minutes
    id: time_poll

  - platform: state
    entity_id: !input enable_automation
    to: "off"
    id: enable_off

###########################################################################
# CONDITIONS — safety checks before running
###########################################################################
condition:
  # Master enable/disable toggle — must be on for normal logic
  # (enable_off trigger bypasses this via the action choose below)
  - condition: or
    conditions:
      - condition: trigger
        id: enable_off
      - condition: state
        entity_id: !input enable_automation
        state: "on"

  # Thermostat must be reachable
  - condition: template
    value_template: >
      {{ states(thermostat) not in ['off', 'unavailable', 'unknown'] }}

###########################################################################
# ACTIONS — main control logic
###########################################################################
action:
  - choose:

      #######################################################################
      # CASE 1 — Automation disabled → turn thermostat OFF (once)
      #######################################################################
      - conditions:
          - condition: trigger
            id: "enable_off"
        sequence:
          - service: climate.turn_off
            target:
              entity_id: !input thermostat

          - service: system_log.write
            data:
              message: "Climate control disabled → thermostat turned OFF"
              level: warning

      #######################################################################
      # CASE 2 — Automation enabled → multi-room control logic
      #######################################################################
      - conditions:
          - condition: state
            entity_id: !input enable_automation
            state: "on"
        sequence:

          # ----------------------------------------------------------------
          # STEP 1 — Early exit if no valid room data
          # ----------------------------------------------------------------
          - condition: template
            value_template: "{{ rooms | length > 0 }}"

          # ----------------------------------------------------------------
          # STEP 2 — Verbose decision log
          # ----------------------------------------------------------------
          - service: system_log.write
            data:
              message: >
                {% set mode_label = current_mode if mode_entity_active else 'Normal' %}
                {% set winner_label = 'Room ' ~ winning_room.id ~ ' (' ~ winning_room.name ~ ')'
                   if winning_room != 'none' and winning_room is mapping else 'none' %}
                [v0.2.0b] {{ now().strftime('%H:%M') }} | Mode: {{ mode_label }} | Decision: {{ hvac_decision }} | Winner: {{ winner_label }}
                {% for r in all_rooms_debug %}
                  {% set active_room = rooms | selectattr('id', 'eq', r.id) | list %}
                  {% set tag = r.rule %}
                  {% set tag = tag ~ ', night_only' if r.schedule == 'night_only' else tag %}
                  {% set tag = tag ~ ', day_only' if r.schedule == 'day_only' else tag %}
                  {% if not r.has_temp or (r.schedule == 'always' and not r.enabled) %}
                    {% set status = 'disabled/unavailable' %}
                    {% set damper_lbl = 'damper CLOSED' %}
                  {% elif not r.schedule_active %}
                    {% set inactive_why = 'day mode' if r.schedule == 'night_only' else 'night mode' %}
                    {% set status = 'INACTIVE (' ~ inactive_why ~ ')' %}
                    {% set damper_lbl = 'damper CLOSED' %}
                  {% else %}
                    {% set ar = active_room[0] %}
                    {% set away_tag = ' [away]' if is_away_mode else '' %}
                    {% if ar.needs_heat %}
                      {% set status = ar.temp | string ~ '°F | too cold <' ~ ar.eff_min ~ '°F' ~ away_tag ~ ' → HEAT' %}
                    {% elif ar.needs_cool %}
                      {% set status = ar.temp | string ~ '°F | too warm >' ~ ar.eff_max ~ '°F' ~ away_tag ~ ' → COOL' %}
                    {% else %}
                      {% set status = ar.temp | string ~ '°F | comfortable (' ~ ar.eff_min ~ '–' ~ ar.eff_max ~ '°F)' ~ away_tag %}
                    {% endif %}
                    {% if r.id == 1 %}{% set d_open = room1_damper_open %}
                    {% elif r.id == 2 %}{% set d_open = room2_damper_open %}
                    {% elif r.id == 3 %}{% set d_open = room3_damper_open %}
                    {% else %}{% set d_open = room4_damper_open %}{% endif %}
                    {% set damper_lbl = 'damper OPEN' if d_open else 'damper CLOSED' %}
                  {% endif %}
                  {% set arrow = ' ← WINNER' if winning_room != 'none' and winning_room is mapping and winning_room.id == r.id else '' %}
                  Room {{ r.id }} ({{ r.name }}) [{{ tag }}] {{ status }} | {{ damper_lbl }}{{ arrow }}
                {% endfor %}
                {% if hvac_decision == 'comfortable' %}Thermostat → heat_cool band {{ neutral_low }}–{{ neutral_high }}°F
                {% else %}Thermostat → {{ hvac_decision }} mode, setpoint = thermostat_temp {{ '+' if hvac_decision == 'heat' else '-' }} {{ setpoint_step }}°F (clamped {{ min_sp }}–{{ max_sp }}°F){% endif %}
              level: info

          # ----------------------------------------------------------------
          # STEP 3 — Damper control (set BEFORE HVAC change so vents are
          #          in position before conditioned air flows).
          #
          #   Primary damper: always actuated.
          #   Secondary damper: only actuated when roomN_damper2 is configured
          #   (non-empty). Using variable rN_damper2 in the if-guard rather
          #   than !input so the condition can be evaluated at runtime.
          # ----------------------------------------------------------------

          # --- Room 1 ---
          - choose:
              - conditions: "{{ room1_damper_open }}"
                sequence:
                  - service: switch.turn_off
                    target:
                      entity_id: !input room1_damper
            default:
              - service: switch.turn_on
                target:
                  entity_id: !input room1_damper

          - if:
              - condition: template
                value_template: "{{ r1_damper2 is string and r1_damper2 != '' }}"
            then:
              - choose:
                  - conditions: "{{ room1_damper_open }}"
                    sequence:
                      - service: switch.turn_off
                        target:
                          entity_id: "{{ r1_damper2 }}"
                default:
                  - service: switch.turn_on
                    target:
                      entity_id: "{{ r1_damper2 }}"

          # --- Room 2 ---
          - choose:
              - conditions: "{{ room2_damper_open }}"
                sequence:
                  - service: switch.turn_off
                    target:
                      entity_id: !input room2_damper
            default:
              - service: switch.turn_on
                target:
                  entity_id: !input room2_damper

          - if:
              - condition: template
                value_template: "{{ r2_damper2 is string and r2_damper2 != '' }}"
            then:
              - choose:
                  - conditions: "{{ room2_damper_open }}"
                    sequence:
                      - service: switch.turn_off
                        target:
                          entity_id: "{{ r2_damper2 }}"
                default:
                  - service: switch.turn_on
                    target:
                      entity_id: "{{ r2_damper2 }}"

          # --- Room 3 ---
          - choose:
              - conditions: "{{ room3_damper_open }}"
                sequence:
                  - service: switch.turn_off
                    target:
                      entity_id: !input room3_damper
            default:
              - service: switch.turn_on
                target:
                  entity_id: !input room3_damper

          - if:
              - condition: template
                value_template: "{{ r3_damper2 is string and r3_damper2 != '' }}"
            then:
              - choose:
                  - conditions: "{{ room3_damper_open }}"
                    sequence:
                      - service: switch.turn_off
                        target:
                          entity_id: "{{ r3_damper2 }}"
                default:
                  - service: switch.turn_on
                    target:
                      entity_id: "{{ r3_damper2 }}"

          # --- Room 4 ---
          - choose:
              - conditions: "{{ room4_damper_open }}"
                sequence:
                  - service: switch.turn_off
                    target:
                      entity_id: !input room4_damper
            default:
              - service: switch.turn_on
                target:
                  entity_id: !input room4_damper

          - if:
              - condition: template
                value_template: "{{ r4_damper2 is string and r4_damper2 != '' }}"
            then:
              - choose:
                  - conditions: "{{ room4_damper_open }}"
                    sequence:
                      - service: switch.turn_off
                        target:
                          entity_id: "{{ r4_damper2 }}"
                default:
                  - service: switch.turn_on
                    target:
                      entity_id: "{{ r4_damper2 }}"

          # ----------------------------------------------------------------
          # STEP 4 — Deadband check: skip thermostat updates when already correct
          # ----------------------------------------------------------------
          - variables:
              current_setpoint: "{{ state_attr(thermostat, 'temperature') | float(none) }}"
              current_low: "{{ state_attr(thermostat, 'target_temp_low') | float(none) }}"
              current_high: "{{ state_attr(thermostat, 'target_temp_high') | float(none) }}"
              # Read live thermostat sensor, then step up (heat) or down (cool)
              winning_setpoint: >
                {% if winning_room != 'none' and winning_room is mapping %}
                  {% set therm_temp = state_attr(thermostat, 'current_temperature') | float %}
                  {% if hvac_decision == 'heat' %}
                    {% set raw = (therm_temp + setpoint_step) | round(1) %}
                  {% else %}
                    {% set raw = (therm_temp - setpoint_step) | round(1) %}
                  {% endif %}
                  {{ [[raw, min_sp] | max, max_sp] | min }}
                {% else %}
                  0
                {% endif %}

          - condition: or
            conditions:
              # Active mode: room is meaningfully off target
              - "{{ hvac_decision in ['heat', 'cool'] and winning_deviation > 0.9 }}"
              # Active mode: thermostat setpoint doesn't match what we'd set
              - "{{ hvac_decision in ['heat', 'cool'] and
                    (current_setpoint is none or (winning_setpoint - current_setpoint) | abs > 0.7) }}"
              # Comfortable mode: thermostat band doesn't match our neutral band
              - "{{ hvac_decision == 'comfortable' and
                    (current_low is none or current_high is none or
                     current_low != neutral_low or current_high != neutral_high) }}"

          # ----------------------------------------------------------------
          # STEP 5 — HVAC mode + setpoint (3 branches)
          # ----------------------------------------------------------------
          - choose:

              # BRANCH: Active heating needed
              - conditions: "{{ hvac_decision == 'heat' }}"
                sequence:
                  - service: climate.set_hvac_mode
                    target:
                      entity_id: !input thermostat
                    data:
                      hvac_mode: heat
                  - delay:
                      seconds: 3
                  - service: climate.set_temperature
                    target:
                      entity_id: !input thermostat
                    data:
                      temperature: "{{ winning_setpoint }}"

              # BRANCH: Active cooling needed
              - conditions: "{{ hvac_decision == 'cool' }}"
                sequence:
                  - service: climate.set_hvac_mode
                    target:
                      entity_id: !input thermostat
                    data:
                      hvac_mode: cool
                  - delay:
                      seconds: 3
                  - service: climate.set_temperature
                    target:
                      entity_id: !input thermostat
                    data:
                      temperature: "{{ winning_setpoint }}"

              # BRANCH: All rooms comfortable → wide neutral band
            default:
              - service: climate.set_hvac_mode
                target:
                  entity_id: !input thermostat
                data:
                  hvac_mode: heat_cool
              - service: climate.set_temperature
                target:
                  entity_id: !input thermostat
                data:
                  target_temp_low: "{{ neutral_low }}"
                  target_temp_high: "{{ neutral_high }}"

# Prevent overlapping runs
mode: single
